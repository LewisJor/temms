services:
  # Local MLflow server with PostgreSQL backend
  mlflow-db:
    image: postgres:14
    container_name: temms-mlflow-db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data
    networks:
      - temms-local
    restart: unless-stopped

  mlflow-server:
    image: python:3.11-slim
    container_name: temms-mlflow-server
    depends_on:
      - mlflow-db
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
      - ./scripts/mlflow-entrypoint.sh:/entrypoint.sh
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:5000"
    networks:
      - temms-local
    restart: unless-stopped
    command: /entrypoint.sh

  # TEMMS Edge Daemon (sim environment)
  temms-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TEMMS_EXTRAS: ${TEMMS_EXTRAS:-sim}
    container_name: temms-daemon
    ports:
      - "8080:8080"
    volumes:
      - temms-data:/var/lib/temms
      - ./src:/app/src:ro          # Live-reload source code (read-only)
      - ./examples:/app/examples   # Editable example models and policies
    environment:
      - TEMMS_LOG_LEVEL=INFO
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - TEMMS_DEVICE_ID=edge-sim
      - TEMMS_DEVICE_PROFILE=x86_64-cpu
      - TEMMS_EDGE_HEARTBEAT_INTERVAL_S=30
      # Signing key intentionally unset: the entrypoint generates an Ed25519
      # demo keypair (real asymmetric, offline-verifiable provenance). Set
      # TEMMS_PACKAGE_SIGNING_KEY / _FILE here to override.
      - TEMMS_ROLLOUT_REQUIRE_SIGNATURE=true
      - TEMMS_DEMO_SEED_HUB=1
    networks:
      - temms-local
    depends_on:
      - mlflow-server
    restart: unless-stopped

  # Optional: MinIO for S3-compatible artifact storage (local)
  # Uncomment if you want S3-like storage instead of filesystem
  # minio:
  #   image: minio/minio
  #   container_name: temms-minio
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio-data:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   networks:
  #     - temms-local
  #   command: server /data --console-address ":9001"

  prometheus:
    image: prom/prometheus:latest
    container_name: temms-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - temms-local
    depends_on:
      - temms-daemon

  grafana:
    image: grafana/grafana:latest
    container_name: temms-grafana
    ports:
      - "3000:3000"
    networks:
      - temms-local
    depends_on:
      - prometheus

networks:
  temms-local:
    driver: bridge

volumes:
  mlflow-db-data:
  mlflow-artifacts:
  temms-data:
  # minio-data:
