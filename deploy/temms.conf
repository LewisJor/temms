# TEMMS Default Configuration
# Copy to /etc/temms/temms.yaml and customize

database:
  path: /var/lib/temms/temms.db

storage:
  model_dir: /var/lib/temms/models
  cache_dir: /var/lib/temms/cache

inference:
  host: 0.0.0.0
  http_port: 8080
  grpc_port: 50051
  max_batch_size: 1
  timeout_ms: 5000

policy:
  policy_dir: /etc/temms/policies
  evaluation_interval_s: 5
  enable_auto_switching: true

sync:
  enable_cloud_sync: false
  cloud_endpoint: null
  sync_interval_s: 300
