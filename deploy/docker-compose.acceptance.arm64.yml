# arm64 (Pi-class) edge acceptance overlay — issue #33.
#
# Apple Silicon runs linux/arm64 natively, so a Raspberry-Pi-class target can be
# validated on the laptop with no emulation and no hardware. Pinning the platform
# makes the architecture an asserted property of the run rather than an accident
# of whichever machine happened to build the image.
#
# This is an opt-in overlay, not part of the default acceptance stack: CI runners
# are amd64, where linux/arm64 needs qemu and would be slow and flaky. Jetson GPU
# validation stays deferred to real hardware per docs/direction.md.
#
#   docker compose -f deploy/docker-compose.acceptance.yml \
#                  -f deploy/docker-compose.acceptance.arm64.yml up --build -d
#   # or: make docker-acceptance-arm64

services:
  temms-edge-airgap:
    platform: linux/arm64
    build:
      platforms:
        - linux/arm64
    environment:
      # arm64-cpu, not rpi5-tflite. Both are arm64, so either would satisfy the
      # architecture check — but this image ships onnxruntime and no TFLite, and
      # rpi5-tflite's runtime_constraints require tflite_runtime. Declaring it
      # here would assert a capability the container does not have, which is the
      # same class of unverified claim this PR exists to close.
      #
      # Validating a genuine rpi5-tflite target means building the agent image
      # with tflite_runtime; tracked as a follow-up.
      TEMMS_DEVICE_PROFILE: arm64-cpu
      TEMMS_DEMO_SITE: acceptance-arm64
