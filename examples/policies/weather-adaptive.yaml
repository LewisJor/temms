apiVersion: temms/v1
kind: SlotPolicy
metadata:
  name: weather-adaptive-vision
  description: Adapt vision model to weather conditions

spec:
  slot: vision
  default_model: yolov8-daylight

  rules:
    - name: fog-conditions
      priority: 80
      conditions:
        any:
          - metric: environmental.atmospheric.visibility_m
            operator: lte
            value: 100
          - metric: environmental.atmospheric.precipitation
            operator: in
            value: [fog, mist]
      action:
        switch_to: yolov8-lowlight

    - name: night-operations
      priority: 70
      conditions:
        all:
          - metric: environmental.celestial.ambient
            operator: in
            value: [low, dark]
      action:
        switch_to: yolov8-lowlight

    - name: critical-low-visibility
      priority: 150
      conditions:
        all:
          - metric: environmental.atmospheric.visibility_m
            operator: lte
            value: 20
          - metric: operational.mission.priority
            operator: eq
            value: critical
      action:
        switch_to: mobilenet-tiny

  allow_operator_override: true

  fallback_chain:
    - yolov8-daylight
    - yolov8-lowlight
    - mobilenet-tiny
