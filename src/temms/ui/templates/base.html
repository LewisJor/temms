<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEMMS{% endblock %}</title>
    <script>
        (function () {
            var storedTheme = null;
            try {
                storedTheme = localStorage.getItem("temms-theme");
            } catch (e) {
                storedTheme = null;
            }
            var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            var theme = storedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.classList.toggle("dark", theme === "dark");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --temms-bg: #f4f7f4;
            --temms-surface: #ffffff;
            --temms-surface-alt: #eef3ef;
            --temms-border: #d5ddd6;
            --temms-text: #111a14;
            --temms-muted: #647067;
            --temms-subtle: #7b857e;
            --temms-input: #ffffff;
            --temms-nav: #f8faf8;
            --temms-nav-hover: #edf3ee;
            --temms-nav-active: #dde9e0;
            --temms-footer: #eef3ef;
        }

        html.dark {
            --temms-bg: #050606;
            --temms-surface: #090a0a;
            --temms-surface-alt: #0d0f0f;
            --temms-border: #27272a;
            --temms-text: #f4f4f5;
            --temms-muted: #a1a1aa;
            --temms-subtle: #71717a;
            --temms-input: #050606;
            --temms-nav: #090a0a;
            --temms-nav-hover: #18181b;
            --temms-nav-active: #27272a;
            --temms-footer: #090a0a;
        }

        body {
            background: var(--temms-bg);
            color: var(--temms-text);
        }

        [hx-indicator] .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }

        .temms-nav {
            background: var(--temms-nav);
            border-color: var(--temms-border);
            color: var(--temms-text);
        }

        .temms-nav-link {
            border-color: transparent;
            color: var(--temms-text);
        }

        .temms-nav-link:hover {
            background: var(--temms-nav-hover);
            border-color: var(--temms-border);
        }

        .temms-nav-link-active {
            background: var(--temms-nav-active);
            border-color: var(--temms-border);
        }

        .theme-toggle-button {
            align-items: center;
            background: var(--temms-surface-alt);
            border: 1px solid var(--temms-border);
            color: var(--temms-text);
            display: inline-flex;
            height: 2.5rem;
            justify-content: center;
            width: 2.5rem;
        }

        .theme-toggle-button:hover {
            background: var(--temms-nav-hover);
        }

        .theme-toggle-button svg {
            height: 1.1rem;
            width: 1.1rem;
        }

        .theme-icon-sun {
            display: none;
        }

        html.dark .theme-icon-sun {
            display: block;
        }

        html.dark .theme-icon-moon {
            display: none;
        }

        .temms-footer {
            background: var(--temms-footer);
            border-color: var(--temms-border);
            color: var(--temms-muted);
        }

        .theme-app {
            background: var(--temms-bg);
            color: var(--temms-text);
        }

        .theme-app.bg-\[\#050606\],
        .theme-app .bg-\[\#050606\],
        .theme-app .bg-\[\#090a0a\] {
            background-color: var(--temms-surface) !important;
        }

        .theme-app .bg-\[\#0d0f0f\],
        .theme-app .bg-zinc-950 {
            background-color: var(--temms-surface-alt) !important;
        }

        .theme-app .bg-zinc-800 {
            background-color: var(--temms-border) !important;
        }

        .theme-app .border-zinc-800,
        .theme-app .border-zinc-700 {
            border-color: var(--temms-border) !important;
        }

        .theme-app .divide-zinc-800 > :not([hidden]) ~ :not([hidden]) {
            border-color: var(--temms-border) !important;
        }

        .theme-app .text-zinc-50,
        .theme-app .text-zinc-100,
        .theme-app .text-zinc-200 {
            color: var(--temms-text) !important;
        }

        .theme-app .text-zinc-300,
        .theme-app .text-zinc-400 {
            color: var(--temms-muted) !important;
        }

        .theme-app .text-zinc-500,
        .theme-app .text-zinc-600 {
            color: var(--temms-subtle) !important;
        }

        .theme-app input,
        .theme-app select,
        .theme-app textarea {
            background-color: var(--temms-input) !important;
            border-color: var(--temms-border) !important;
            color: var(--temms-text) !important;
        }

        .theme-app input::placeholder,
        .theme-app textarea::placeholder {
            color: var(--temms-subtle) !important;
        }

        .theme-app tr.hover\:bg-zinc-900\/70:hover {
            background-color: var(--temms-nav-hover) !important;
        }

        html.dark .bg-white,
        html.dark .bg-gray-50,
        html.dark .bg-gray-100 {
            background-color: var(--temms-surface) !important;
        }

        html.dark .text-gray-400,
        html.dark .text-gray-500,
        html.dark .text-gray-600,
        html.dark .text-gray-700,
        html.dark .text-gray-800,
        html.dark .text-gray-900 {
            color: var(--temms-muted) !important;
        }

        html.dark input,
        html.dark select,
        html.dark textarea,
        html.dark table {
            background-color: var(--temms-surface-alt);
            border-color: var(--temms-border);
            color: var(--temms-text);
        }

        html.dark thead {
            background-color: var(--temms-surface-alt) !important;
        }

        html.dark .divide-gray-200 > :not([hidden]) ~ :not([hidden]),
        html.dark .border,
        html.dark .border-t {
            border-color: var(--temms-border);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="temms-nav border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col gap-3 py-3">
                <div class="flex shrink-0 items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                    <a href="/ui/" class="text-xl font-bold text-green-400">TEMMS</a>
                    <span class="hidden text-sm sm:inline" style="color: var(--temms-muted)">Offline Edge ML Ops</span>
                    </div>
                    <button type="button" data-theme-toggle class="theme-toggle-button" aria-label="Toggle color mode">
                        <svg class="theme-icon-moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.8 14.4A8.2 8.2 0 0 1 9.6 3.2 7 7 0 1 0 20.8 14.4Z"></path>
                        </svg>
                        <svg class="theme-icon-sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="m4.93 4.93 1.41 1.41"></path>
                            <path d="m17.66 17.66 1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="m6.34 17.66-1.41 1.41"></path>
                            <path d="m19.07 4.93-1.41 1.41"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex gap-2 overflow-x-auto pb-1 lg:pb-0">
                    <a href="/ui/" class="temms-nav-link whitespace-nowrap border px-3 py-2 text-sm font-semibold {% if active_page == 'operate' %}temms-nav-link-active{% endif %}">Deploy</a>
                    <a href="/ui/runtimes" class="temms-nav-link whitespace-nowrap border px-3 py-2 text-sm font-semibold {% if active_page == 'runtimes' %}temms-nav-link-active{% endif %}">Runtime Images</a>
                    <a href="/ui/hub" class="temms-nav-link whitespace-nowrap border px-3 py-2 text-sm font-semibold {% if active_page == 'hub' %}temms-nav-link-active{% endif %}">Admin Workbench</a>
                    <a href="http://localhost:5000" target="_blank" class="whitespace-nowrap border border-transparent px-3 py-2 text-sm text-emerald-300 hover:border-emerald-500/50 hover:bg-emerald-500/10">MLflow &#8599;</a>
                </div>
                <details class="text-xs" {% if active_page in ['dashboard', 'slots', 'conditions', 'decisions', 'models', 'import'] %}open{% endif %}>
                    <summary class="w-fit cursor-pointer whitespace-nowrap px-1 py-2 font-semibold uppercase tracking-[0.14em]" style="color: var(--temms-subtle)">Agent diagnostics</summary>
                    <div class="mt-1 flex gap-2 overflow-x-auto">
                        <a href="/ui/dashboard" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'dashboard' %}temms-nav-link-active{% endif %}">Dashboard</a>
                        <a href="/ui/slots" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'slots' %}temms-nav-link-active{% endif %}">Slots</a>
                        <a href="/ui/conditions" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'conditions' %}temms-nav-link-active{% endif %}">Conditions</a>
                        <a href="/ui/decisions" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'decisions' %}temms-nav-link-active{% endif %}">Decisions</a>
                        <a href="/ui/models" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'models' %}temms-nav-link-active{% endif %}">Models</a>
                        <a href="/ui/import" class="temms-nav-link whitespace-nowrap border px-2 py-2 {% if active_page == 'import' %}temms-nav-link-active{% endif %}">Import</a>
                    </div>
                </details>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="temms-footer border-t mt-8">
        <div class="max-w-7xl mx-auto px-4 py-3 text-sm text-gray-500">
            TEMMS v0.1.0 | API: <a href="/v1/health" class="text-blue-500">/v1/health</a> |
            <a href="/docs" class="text-blue-500">API Docs</a>
        </div>
    </footer>
    <script>
        (function () {
            function currentTheme() {
                return document.documentElement.classList.contains("dark") ? "dark" : "light";
            }

            function applyTheme(theme) {
                document.documentElement.classList.toggle("dark", theme === "dark");
                document.documentElement.setAttribute("data-theme", theme);
                try {
                    localStorage.setItem("temms-theme", theme);
                } catch (e) {
                    // Theme still applies for the current page even if storage is unavailable.
                }
                document.querySelectorAll("[data-theme-toggle]").forEach(function (button) {
                    var label = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
                    button.setAttribute("aria-label", label);
                    button.setAttribute("title", label);
                });
            }

            document.querySelectorAll("[data-theme-toggle]").forEach(function (button) {
                button.addEventListener("click", function () {
                    applyTheme(currentTheme() === "dark" ? "light" : "dark");
                });
            });
            applyTheme(currentTheme());
        })();
    </script>
</body>
</html>
