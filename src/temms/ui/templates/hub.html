<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TEMMS - Mission Package Workbench</title>
    {% for stylesheet in hub_assets.styles %}
    <link rel="stylesheet" href="{{ stylesheet }}">
    {% endfor %}
</head>
<body>
    <div id="root">
        {% if not hub_assets.scripts %}
        <main style="font-family: system-ui, sans-serif; max-width: 720px; margin: 48px auto; padding: 24px; border: 1px solid #d5ddd6;">
            <p style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #647067;">TEMMS Hub</p>
            <h1 style="margin: 8px 0 12px;">Mission Package Workbench</h1>
            <p style="color: #647067; line-height: 1.55;">The React Hub UI has not been built yet.</p>
            <pre style="background: #0b0d0d; color: #eef5f0; padding: 16px; overflow-x: auto;">npm install
npm run build</pre>
        </main>
        {% endif %}
    </div>
    {% for script in hub_assets.scripts %}
    <script type="module" src="{{ script }}"></script>
    {% endfor %}
</body>
</html>
