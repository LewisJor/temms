name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - codex-mvp-demo-edge-platform

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  frontend:
    name: React Hub UI contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Typecheck, build, and smoke React Hub
        run: make ui-ci

      - name: Verify committed Hub assets are current
        run: git diff --exit-code -- src/temms/ui/static/hub

  python:
    name: Python tests and package build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra inference

      - name: Build package
        run: uv build

      - name: Run unit and MVP acceptance tests
        run: |
          uv run pytest \
            tests/unit \
            tests/integration/test_canonical_product_loop.py \
            tests/integration/test_hub_lite_mvp_flow.py \
            tests/integration/test_hub_lite_online_sync.py \
            tests/integration/test_mvp_multi_vm_acceptance.py \
            tests/integration/test_soak_smoke.py \
            -q

  docker:
    name: Docker image and edge acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host dependencies
        run: uv sync --locked --extra dev --extra inference

      - name: Build TEMMS Docker image
        run: docker build --build-arg TEMMS_EXTRAS=inference -t temms/agent:ci .

      - name: Run containerized edge acceptance
        env:
          KEEP_CONTAINERS: "true"
          PYTHON_CMD: uv run python
          WAIT_SECONDS: "120"
        run: make docker-acceptance

      - name: Collect acceptance diagnostics
        if: always()
        run: |
          mkdir -p temms-mvp-acceptance
          docker compose -f deploy/docker-compose.acceptance.yml ps > temms-mvp-acceptance/docker-compose-ps.txt || true
          docker compose -f deploy/docker-compose.acceptance.yml logs --no-color > temms-mvp-acceptance/docker-compose.log || true
          docker exec temms-acceptance-hub sh -lc 'id && ls -la /var/lib/temms && find /var/lib/temms -maxdepth 2 -type d -print -exec ls -ld {} \;' > temms-mvp-acceptance/hub-files.txt 2>&1 || true
          docker exec temms-acceptance-edge-airgap sh -lc 'id && ls -la /var/lib/temms && find /var/lib/temms -maxdepth 2 -type d -print -exec ls -ld {} \;' > temms-mvp-acceptance/airgap-files.txt 2>&1 || true
          if [ -f temms-mvp-acceptance/hub-lite-airgap-bundle.json ]; then
            uv run python - <<'PY' > temms-mvp-acceptance/airgap-bundle-summary.json
          import json
          from pathlib import Path

          bundle = json.loads(Path("temms-mvp-acceptance/hub-lite-airgap-bundle.json").read_text())
          artifacts = bundle.get("package_artifacts") or {}
          print(json.dumps({
              "schema_version": bundle.get("schema_version"),
              "packages": sorted((bundle.get("hub_lite") or {}).get("packages", {}).keys()),
              "rollouts": sorted((bundle.get("hub_lite") or {}).get("rollouts", {}).keys()),
              "artifact_count": len(artifacts),
              "artifacts": {
                  package_id: {
                      "filename": artifact.get("filename"),
                      "sha256": artifact.get("sha256"),
                      "source_sha256": artifact.get("source_sha256"),
                      "content_base64_len": len(artifact.get("content_base64") or ""),
                  }
                  for package_id, artifact in artifacts.items()
              },
          }, indent=2, sort_keys=True))
          PY
          fi

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: temms-acceptance-evidence
          path: |
            temms-mvp-acceptance/*.json
            temms-mvp-acceptance/*.log
            temms-mvp-acceptance/*.txt
          if-no-files-found: ignore

      - name: Clean up acceptance stack
        if: always()
        run: make docker-acceptance-down

  compose-smoke:
    name: Ubuntu 22.04 compose smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host test dependencies
        run: uv sync --locked --extra dev --extra inference

      - name: Start TEMMS compose stack
        env:
          MLFLOW_HOST_PORT: "5001"
          TEMMS_EXTRAS: inference
        run: docker compose up --build -d

      - name: Run compose smoke checks
        env:
          TEMMS_COMPOSE_SMOKE: "1"
          TEMMS_SMOKE_TEMMS_URL: "http://127.0.0.1:8080"
          TEMMS_SMOKE_MLFLOW_URL: "http://127.0.0.1:5001"
        run: uv run pytest tests/integration/test_compose_stack_smoke.py -q

      - name: Publish compose smoke summary
        if: always()
        run: uv run python scripts/compose_smoke_report.py || true

      - name: Clean up compose stack
        if: always()
        run: docker compose down -v
